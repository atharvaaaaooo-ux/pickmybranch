<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickMyBranch</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .container{
            max-width:800px;
            padding:20px;
        }

        h1{
            font-size:4rem;
            margin-bottom:10px;
        }

        h2{
            font-weight:normal;
            color:#cbd5e1;
            margin-bottom:30px;
        }

        p{
            color:#94a3b8;
            margin-bottom:30px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>PickMyBranch</h1>

    <h2>Find the engineering branch that fits you.</h2>

    <p>
        Take our engineering assessment and discover which branch
        matches your interests, strengths and career goals.
    </p>


    <button onclick="startQuiz()">Start Assessment</button>

    <br><br><br>

    <small>Built by Atharva Suryawanshi</small>

</div>

    <script>
function startQuiz() {
    document.querySelector('.container').innerHTML = `
        <h1>Question 1 of 50</h1>

        <h2>Which project sounds most exciting?</h2>

        <button>Build a Mobile App</button>
        <br><br>

        <button>Create an AI Chatbot</button>
        <br><br>

        <button>Design a Drone</button>
        <br><br>

        <button>Develop a Medical Device</button>
    `;
}
</script>
</body>
</html>
