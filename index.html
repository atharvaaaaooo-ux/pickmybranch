<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickMyBranch</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .container{
            max-width:800px;
            padding:20px;
        }

        h1{
            font-size:4rem;
            margin-bottom:10px;
        }

        h2{
            font-weight:normal;
            color:#cbd5e1;
            margin-bottom:30px;
        }

        p{
            color:#94a3b8;
            margin-bottom:30px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>PickMyBranch</h1>

    <h2>Find the engineering branch that fits you.</h2>

    <p>
        Take our engineering assessment and discover which branch
        matches your interests, strengths and career goals.
    </p>


    <button onclick="startQuiz()">Start Assessment</button>

    <br><br><br>

    <small>Built by Atharva Suryawanshi</small>

</div>

    <script>
function startQuiz() 
        let currentQuestion = 0;

const questions = [
{
question: "Which project sounds most exciting?",
options: [
"Build a Mobile App",
"Create an AI Chatbot",
"Design a Drone",
"Develop a Medical Device"
]
},
{
question: "Which subject do you enjoy most?",
options: [
"Computer Science",
"Mathematics",
"Physics",
"Biology"
]
}
];

function startQuiz() {
    showQuestion();
}

function showQuestion() {

    const q = questions[currentQuestion];

    document.querySelector('.container').innerHTML = `
        <h1>Question ${currentQuestion + 1} of ${questions.length}</h1>

        <h2>${q.question}</h2>

        <button onclick="nextQuestion()">${q.options[0]}</button>
        <br><br>

        <button onclick="nextQuestion()">${q.options[1]}</button>
        <br><br>

        <button onclick="nextQuestion()">${q.options[2]}</button>
        <br><br>

        <button onclick="nextQuestion()">${q.options[3]}</button>
    `;
}

function nextQuestion() {

    currentQuestion++;

    if(currentQuestion >= questions.length){

        document.querySelector('.container').innerHTML = `
            <h1>Assessment Complete!</h1>
            <h2>Results coming soon...</h2>
        `;

        return;
    }

    showQuestion();
}
</script>
</body>
</html>
